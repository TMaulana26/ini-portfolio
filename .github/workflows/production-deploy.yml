name: Production Deployment (mtim.my.id)

on:
  push:
    tags:
      - "v*.*.*" # Hanya akan berjalan jika Anda melakukan push tag seperti v1.0.0

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build project
        env:
          VITE_CONTACT_API_URL: ${{ secrets.VITE_CONTACT_API_URL }}
        run: npm run build

      # Deploy ke Cloudflare Workers/Pages statis
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
